services:
  sumo:
    image: ghcr.io/eclipse-sumo/sumo:latest
    container_name: sumo
    entrypoint: ["/bin/bash"]
    command: >
      -c "
        # Auto-set LD_LIBRARY_PATH on every login
        export LD_LIBRARY_PATH=\$(dirname \$(find / -name 'libparquet.so*' 2>/dev/null | head -1)):\$LD_LIBRARY_PATH
        
        echo '========================================'
        echo 'SUMO container ready with LD_LIBRARY_PATH set'
        echo 'You can now run: sumo-gui ...'
        echo '========================================'
        
        # Start an interactive shell
        exec /bin/bash
      "
    volumes:
      - ./sumoDocker:/sumo-projs
    working_dir: /sumo-projs
    ports:
      - "8813:8813"
    stdin_open: true
    environment:
      - DISPLAY=host.docker.internal:0
    restart: unless-stopped
    networks:
      - TrafficAgenticAi

  traci-mcp:
    image: traci-mcp:latest
    container_name: traci-mcp
    environment:
      SUMO_HOST: sumo          # Docker DNS resolves service name
      SUMO_PORT: "8813"
    depends_on:
      - sumo
    stdin_open: true
    networks:
      - TrafficAgenticAi

networks:
  TrafficAgenticAi:
    external: true