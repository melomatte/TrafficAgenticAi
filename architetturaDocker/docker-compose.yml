services:
  # 1. Il Server MCP (parte per primo)
  mcp_server:
    build: ./MCPContainer
    container_name: mcp_server
    networks:
      - agentic_net           
    ports:
      - "8080:8080"

  # 2. La Gerarchia Agenti (dipende dall'MCP)
  agentic_system:
    build: ./agentContainer
    container_name: agentic_system
    networks:
      - agentic_net
    environment:
      - MODEL_NAME=${MODEL_NAME}
      - PROVIDER=${PROVIDER}
    ports:
      - "8000:8000"
    depends_on:
      - mcp_server

  # 3. Il Motore SUMO (dipende da entrambi per non inviare trigger a vuoto)
  sumo_simulation:
    build: ./simulationContainer
    container_name: sumo_simulation
    networks:
      - agentic_net
    # Configurazione X11 per vedere la GUI sul tuo monitor
    environment:
      - DISPLAY=${DISPLAY}
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    depends_on:
      - mcp_server
      - agentic_system

networks:
  agentic_net:
    driver: bridge